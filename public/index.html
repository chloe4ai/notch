<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notch · traces of a day</title>
  <style>
    :root {
      --bg: #faf8f5;
      --panel: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --line: #e8e4dd;
      --accent: #c75d3a;
      --accent-soft: #fbeee7;
      --good: #2e7d4f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 28px 24px 80px; }
    header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    header h1 { margin: 0; font-size: 22px; letter-spacing: -0.01em; }
    header .head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    header .meta { font-size: 12px; color: var(--muted); text-align: right; }
    header .meta code { background: #f0ece6; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
    select#lang-select {
      font: inherit; font-size: 12px;
      padding: 4px 8px; border-radius: 7px;
      border: 1px solid var(--line); background: #fff; color: var(--ink);
      cursor: pointer; outline: none;
    }
    select#lang-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .card h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      font: inherit;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .row { display: flex; gap: 8px; align-items: center; }
    .row + .row { margin-top: 8px; }
    button {
      font: inherit;
      padding: 8px 14px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }
    button:hover { border-color: #c8c1b6; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { filter: brightness(0.95); }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] {
      flex: 1; font: inherit; padding: 8px 10px;
      border: 1px solid var(--line); border-radius: 7px; background: #fff; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .timeline { list-style: none; margin: 0; padding: 0; }
    .timeline li {
      display: flex; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .timeline li:last-child { border-bottom: none; }
    .timeline .ts { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 56px; }
    .timeline .body { flex: 1; }
    .pill {
      display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent); margin-right: 6px;
    }
    .pill.task { background: #e7f1ec; color: var(--good); }
    .running {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--accent-soft);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .running .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .summary {
      background: #fffdf8;
      border-left: 3px solid var(--accent);
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 0 8px 8px 0;
    }
    .summary h3 { margin: 0 0 6px; font-size: 14px; }
    .summary .when { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .summary pre {
      white-space: pre-wrap; word-wrap: break-word; font: inherit;
      margin: 0;
    }
    .totals { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-top: 6px; }
    .totals strong { color: var(--ink); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
    .chat-log { display: flex; flex-direction: column; gap: 10px; max-height: 360px; overflow-y: auto; padding: 2px; }
    .chat-msg { display: flex; }
    .chat-msg.user { justify-content: flex-end; }
    .chat-msg .bubble {
      max-width: 82%; padding: 9px 13px; border-radius: 13px; font-size: 14px;
      line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    }
    .chat-msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .chat-msg.assistant .bubble { background: #f3efe9; color: var(--ink); border-bottom-left-radius: 4px; }
    .chat-msg.assistant .bubble strong { color: var(--ink); }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .chip { font-size: 12px; padding: 4px 10px; border-radius: 999px; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a1a; color: #fff;
      padding: 10px 14px; border-radius: 7px;
      font-size: 13px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--line); }
    .tab {
      appearance: none; border: none; background: none; cursor: pointer;
      font: inherit; font-size: 15px; color: var(--muted);
      padding: 9px 16px; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-section { animation: fade 0.2s; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .plan textarea { min-height: 110px; }
    .markdown { white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; font-size: 14px; }
    .markdown strong { color: var(--ink); }
    .summary .markdown { margin: 0; }
    .weekgrid { display: flex; gap: 6px; flex-wrap: wrap; }
    .weekgrid .daycell {
      flex: 1; min-width: 92px; background: #faf8f4; border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 10px; font-size: 12px;
    }
    .weekgrid .daycell .d { color: var(--muted); margin-bottom: 4px; }
    .weekgrid .daycell.today { border-color: var(--accent); background: var(--accent-soft); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><span data-i18n="brand">Notch</span> <span data-i18n="tagline" style="font-size:13px;color:var(--muted);font-weight:normal;letter-spacing:0;">· traces of a day</span></h1>
      <div class="head-right">
        <select id="lang-select" aria-label="Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
        <div class="meta" id="meta"></div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today" data-i18n="tab.today">Today</button>
      <button class="tab" data-tab="week" data-i18n="tab.week">Weekly</button>
      <button class="tab" data-tab="assistant" data-i18n="tab.assistant">Assistant</button>
    </nav>

    <!-- ===================== Today ===================== -->
    <section class="tab-section" id="tab-today">
      <div class="card">
        <h2 data-i18n="card.now">Now</h2>
        <div id="running-host"></div>
        <div class="row">
          <input type="text" id="task-name" data-i18n-ph="now.placeholder" placeholder='e.g. Resume edit - Stripe PM' autocomplete="off"/>
          <button class="primary" id="task-start" data-i18n="now.start">Start</button>
        </div>
        <div class="hint" data-i18n="now.hint">Starting a new task automatically stops the previous one.</div>
      </div>

      <div class="card plan">
        <h2 data-i18n="card.dayPlan">Plan ahead</h2>
        <textarea id="day-plan" data-i18n-ph="plan.dayPlaceholder" placeholder="A few things to push today / priorities / intentions…"></textarea>
        <div class="row" style="margin-top: 10px;">
          <button class="primary" id="day-plan-save" data-i18n="plan.save">Save plan</button>
          <button class="ghost" id="day-plan-draft" data-i18n="plan.draft">Draft with Xiao En</button>
          <span class="hint" id="day-plan-hint" style="margin-left: auto;"></span>
        </div>
      </div>

      <div class="card">
        <h2 data-i18n="card.note">Quick note</h2>
        <textarea id="entry" data-i18n-ph="note.placeholder" placeholder="Whatever's on your mind. ⌘+Enter to save. Dictation (Typeless) works too."></textarea>
        <div class="row" style="margin-top: 10px;">
          <button class="primary" id="entry-save" data-i18n="note.save">Save</button>
          <span class="hint" id="entry-hint" style="margin-left: auto;"></span>
        </div>
      </div>

      <div class="card">
        <h2 data-i18n="card.today">Today</h2>
        <div class="totals" id="totals"></div>
        <ul class="timeline" id="timeline"></ul>
      </div>

      <div class="card">
        <h2 style="display:flex;align-items:center;gap:8px;">
          <span data-i18n="card.dayRecap">Recap</span>
          <button class="ghost" id="summarize" data-i18n="note.summarizeNow" style="margin-left:auto;font-size:12px;padding:4px 10px;text-transform:none;letter-spacing:0;">Summarize now</button>
        </h2>
        <div id="summaries"></div>
      </div>

      <div class="card">
        <h2 style="display:flex;align-items:center;gap:8px;">
          <span data-i18n="card.activity">Activity log</span>
          <span id="tracker-status" style="font-size:11px;font-weight:normal;text-transform:none;letter-spacing:0;color:var(--muted);"></span>
          <button id="tracker-toggle" class="ghost" style="margin-left:auto;font-size:12px;padding:4px 10px;text-transform:none;letter-spacing:0;">Pause tracking</button>
        </h2>
        <div id="activity-apps"></div>
        <div id="activity-windows" style="margin-top:12px;"></div>
        <div id="activity-screenshots" style="margin-top:12px;"></div>
      </div>
    </section>

    <!-- ===================== Weekly ===================== -->
    <section class="tab-section" id="tab-week" hidden>
      <div class="card plan">
        <h2 id="week-plan-title" data-i18n="card.weekPlan">Plan ahead</h2>
        <textarea id="week-plan" data-i18n-ph="plan.weekPlaceholder" placeholder="Goals for the week / a few big things…"></textarea>
        <div class="row" style="margin-top: 10px;">
          <button class="primary" id="week-plan-save" data-i18n="plan.save">Save plan</button>
          <button class="ghost" id="week-plan-draft" data-i18n="plan.draft">Draft with Xiao En</button>
          <span class="hint" id="week-plan-hint" style="margin-left: auto;"></span>
        </div>
      </div>

      <div class="card">
        <h2 style="display:flex;align-items:center;gap:8px;">
          <span data-i18n="card.weekRecap">Weekly recap</span>
          <button class="ghost" id="week-summarize" data-i18n="week.generate" style="margin-left:auto;font-size:12px;padding:4px 10px;text-transform:none;letter-spacing:0;">Generate weekly recap</button>
        </h2>
        <div id="week-summaries"></div>
      </div>

      <div class="card">
        <h2 data-i18n="card.weekOverview">This week</h2>
        <div class="totals" id="week-totals"></div>
        <div id="week-grid" class="weekgrid" style="margin-top: 12px;"></div>
        <div id="week-apps" style="margin-top: 14px;"></div>
      </div>
    </section>

    <!-- ===================== Assistant (Xiao En) ===================== -->
    <section class="tab-section" id="tab-assistant" hidden>
      <div class="card">
        <h2 data-i18n="card.assistant">Xiao En</h2>
        <div class="chat-log" id="chat-log"></div>
        <div class="row" style="margin-top: 10px;">
          <input type="text" id="chat-input" data-i18n-ph="ask.placeholder" placeholder="e.g. What did I do in the past hour?" autocomplete="off"/>
          <button class="primary" id="chat-send" data-i18n="ask.send">Send</button>
        </div>
        <div class="chips">
          <button class="ghost chip" data-chip="pastHour" data-q="What did I do in the past hour?">Past hour</button>
          <button class="ghost chip" data-chip="today" data-q="Summarize what I've done today so far">Recap today</button>
          <button class="ghost chip" data-chip="timeWhere" data-q="What did I mostly spend my time on today?">Where time went</button>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

    const LANG_KEY = "notch.lang";
    // English is the default for first-time visitors (recruiters etc.); a saved
    // choice always wins and persists, so switching to 中文 / 日本語 sticks.
    let LANG = (() => {
      try {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved && I18N[saved]) return saved;
      } catch (_) {}
      return "en";
    })();

    function t(key, params) {
      const dict = I18N[LANG] || I18N.zh;
      let s = dict[key];
      if (s == null) s = I18N.zh[key] != null ? I18N.zh[key] : key;
      if (params) for (const k in params) s = s.replaceAll("{" + k + "}", params[k]);
      return s;
    }

    function slotLabel(slot) {
      const dict = I18N[LANG] || I18N.zh;
      return dict["slot." + slot] || dict["slot.adhoc"];
    }

    // Apply translations to all static, attribute-tagged elements + the chips.
    function applyStatic() {
      document.documentElement.lang = LANG;
      document.title = t("title");
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
        el.placeholder = t(el.dataset.i18nPh);
      });
      document.querySelectorAll("[data-chip]").forEach((el) => {
        const k = el.dataset.chip;
        el.textContent = t("chip." + k + ".label");
        el.dataset.q = t("chip." + k + ".q");
      });
    }

    function setLang(lang) {
      if (!I18N[lang]) return;
      LANG = lang;
      try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
      applyStatic();
      renderChat();
      if (state) {
        render();
        refreshActivities();
      }
      if (typeof weekState !== "undefined" && weekState) renderWeek();
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
    }
    function fmtDuration(ms) {
      if (!ms || ms < 0) return "0m";
      const mins = Math.round(ms / 60000);
      if (mins < 60) return mins + "m";
      const h = Math.floor(mins / 60), m = mins % 60;
      return m === 0 ? h + "h" : h + "h" + m + "m";
    }
    function toast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 1800);
    }
    async function api(path, opts = {}) {
      const res = await fetch(path, {
        method: opts.method || "GET",
        headers: { "content-type": "application/json" },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }
      return res.json();
    }

    let state = null;

    function render() {
      // Meta line
      const cfg = state.config;
      const aiVal = cfg.hasLLM ? cfg.model || t("meta.on") : t("meta.off");
      $("meta").innerHTML =
        `${state.date} · ${t("meta.data")} <code>${escapeHTML(cfg.dataDir)}</code> · ` +
        `${t("meta.ai")}<strong>${escapeHTML(aiVal)}</strong> · ` +
        `${t("meta.autoSummary")}${escapeHTML(cfg.schedule)}`;

      // Running task
      const open = state.tasks.find((t) => t.endTs == null);
      const host = $("running-host");
      if (open) {
        const elapsed = Date.now() - new Date(open.startTs).getTime();
        host.innerHTML = `
          <div class="running">
            <span class="dot"></span>
            <strong>${escapeHTML(open.name)}</strong>
            <span style="color: var(--muted)">${t("now.since", { time: fmtTime(open.startTs) })} · ${fmtDuration(elapsed)}</span>
            <button id="stop-btn" style="margin-left:auto;">${t("now.stop")}</button>
          </div>`;
        $("stop-btn").onclick = stopTask;
      } else {
        host.innerHTML = `<div class="empty">${t("now.empty")}</div>`;
      }

      // Totals
      const totalMs = state.tasks.reduce((s, t) =>
        s + (t.durationMs || (t.endTs == null ? Date.now() - new Date(t.startTs).getTime() : 0)), 0);
      $("totals").innerHTML = `
        <span>${t("totals.notes", { n: state.entries.length })}</span>
        <span>${t("totals.tasks", { n: state.tasks.length })}</span>
        <span>${t("totals.total", { dur: fmtDuration(totalMs) })}</span>
      `;

      // Timeline (entries + tasks merged, newest first)
      const items = [
        ...state.entries.map((e) => ({ kind: "entry", ts: e.ts, data: e })),
        ...state.tasks.flatMap((t) => {
          const out = [{ kind: "task-start", ts: t.startTs, data: t }];
          if (t.endTs) out.push({ kind: "task-end", ts: t.endTs, data: t });
          return out;
        }),
      ].sort((a, b) => new Date(b.ts) - new Date(a.ts));

      const tl = $("timeline");
      if (items.length === 0) {
        tl.innerHTML = `<li class="empty">${t("timeline.empty")}</li>`;
      } else {
        tl.innerHTML = items.map((i) => {
          if (i.kind === "entry") {
            return `<li>
              <span class="ts">${fmtTime(i.ts)}</span>
              <div class="body">${escapeHTML(i.data.text)}</div>
            </li>`;
          }
          if (i.kind === "task-start") {
            return `<li>
              <span class="ts">${fmtTime(i.ts)}</span>
              <div class="body"><span class="pill task">${t("pill.start")}</span><strong>${escapeHTML(i.data.name)}</strong></div>
            </li>`;
          }
          return `<li>
            <span class="ts">${fmtTime(i.ts)}</span>
            <div class="body"><span class="pill task">${t("pill.end")}</span>${escapeHTML(i.data.name)} <span style="color:var(--muted)">(${fmtDuration(i.data.durationMs)})</span></div>
          </li>`;
        }).join("");
      }

      // Summaries (newest first)
      const sumHost = $("summaries");
      const sums = [...state.summaries].sort((a, b) => new Date(b.ts) - new Date(a.ts));
      if (sums.length === 0) {
        sumHost.innerHTML = `<div class="empty">${t("summaries.empty")}</div>`;
      } else {
        sumHost.innerHTML = sums.map((s) => `
          <div class="summary">
            <h3>${escapeHTML(slotLabel(s.slot))}</h3>
            <div class="when">${fmtTime(s.ts)} · ${escapeHTML(s.model || t("summaries.noModel"))}</div>
            <div class="markdown">${mdLite(s.text)}</div>
          </div>
        `).join("");
      }

      // Plan textarea (don't clobber while the user is typing)
      if (document.activeElement !== $("day-plan")) $("day-plan").value = state.plan || "";
    }

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function refresh() {
      state = await api("/api/today");
      render();
    }

    async function saveEntry() {
      const ta = $("entry");
      const text = ta.value.trim();
      if (!text) return;
      $("entry-save").disabled = true;
      try {
        await api("/api/entries", { method: "POST", body: { text } });
        ta.value = "";
        await refresh();
        toast(t("toast.saved"));
      } catch (err) {
        toast(t("toast.errPrefix") + err.message);
      } finally {
        $("entry-save").disabled = false;
        ta.focus();
      }
    }

    async function startTask() {
      const name = $("task-name").value.trim();
      if (!name) return;
      try {
        await api("/api/tasks/start", { method: "POST", body: { name } });
        $("task-name").value = "";
        await refresh();
        toast(t("toast.taskStarted"));
      } catch (err) { toast(t("toast.failedPrefix") + err.message); }
    }

    async function stopTask() {
      try {
        await api("/api/tasks/stop", { method: "POST" });
        await refresh();
        toast(t("toast.taskStopped"));
      } catch (err) { toast(t("toast.failedPrefix") + err.message); }
    }

    async function summarize() {
      const btn = $("summarize");
      btn.disabled = true;
      btn.textContent = t("note.summarizing");
      try {
        await api("/api/summarize", { method: "POST", body: { slot: "adhoc", lang: LANG } });
        await refresh();
        toast(t("toast.summaryDone"));
      } catch (err) {
        toast(t("toast.errPrefix") + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = t("note.summarizeNow");
      }
    }

    // --- Chat / Q&A about today ---
    const chatMessages = [];

    function mdLite(s) {
      return escapeHTML(s).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function renderChat() {
      const el = $("chat-log");
      if (!chatMessages.length) {
        el.innerHTML = `<div class="empty">${t("chat.empty")}</div>`;
        return;
      }
      el.innerHTML = chatMessages.map((m) => `
        <div class="chat-msg ${m.role}">
          <div class="bubble">${m.role === "assistant" ? mdLite(m.content) : escapeHTML(m.content)}</div>
        </div>`).join("");
      el.scrollTop = el.scrollHeight;
    }

    async function sendChat(text) {
      const input = $("chat-input");
      const q = (text != null ? text : input.value).trim();
      if (!q) return;
      // History = the conversation so far (before this question).
      const history = chatMessages.map((m) => ({ role: m.role, content: m.content }));
      chatMessages.push({ role: "user", content: q });
      const placeholder = { role: "assistant", content: "…" };
      chatMessages.push(placeholder);
      input.value = "";
      renderChat();
      $("chat-send").disabled = true;
      try {
        const res = await api("/api/ask", { method: "POST", body: { question: q, history, lang: LANG } });
        placeholder.content = res.text || t("chat.noContent");
      } catch (err) {
        placeholder.content = t("chat.error") + err.message;
      } finally {
        $("chat-send").disabled = false;
        renderChat();
        input.focus();
      }
    }

    $("chat-send").onclick = () => sendChat();
    $("chat-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); sendChat(); }
    });
    document.querySelectorAll(".chip").forEach((b) => {
      b.onclick = () => sendChat(b.dataset.q);
    });

    // Language switcher.
    $("lang-select").value = LANG;
    $("lang-select").onchange = (e) => setLang(e.target.value);

    // --- Tabs ---
    const sections = { today: $("tab-today"), week: $("tab-week"), assistant: $("tab-assistant") };
    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
      Object.entries(sections).forEach(([k, el]) => { el.hidden = k !== name; });
      if (name === "week") refreshWeek();
    }
    document.querySelectorAll(".tab").forEach((b) => { b.onclick = () => switchTab(b.dataset.tab); });

    // Fill a plan textarea with an AI draft (reuses the assistant ask endpoint).
    async function draftPlan(textareaId, hintId, questionKey) {
      const hint = $(hintId);
      hint.textContent = t("plan.drafting");
      try {
        const res = await api("/api/ask", { method: "POST", body: { question: t(questionKey), lang: LANG } });
        $(textareaId).value = res.text;
        hint.textContent = t("plan.drafted");
      } catch (err) { hint.textContent = t("chat.error") + err.message; }
    }

    // --- Daily plan (plan ahead) ---
    $("day-plan-save").onclick = async () => {
      try {
        await api("/api/day/plan", { method: "POST", body: { text: $("day-plan").value } });
        toast(t("toast.planSaved"));
      } catch (err) { toast(t("toast.errPrefix") + err.message); }
    };
    $("day-plan-draft").onclick = () => draftPlan("day-plan", "day-plan-hint", "plan.dayDraftQ");

    // --- Weekly ---
    let weekState = null;
    function weekdayLabel(dateStr) {
      try { return new Date(dateStr + "T00:00:00").toLocaleDateString(LANG, { weekday: "short" }); }
      catch (_) { return ""; }
    }
    async function refreshWeek() {
      try { weekState = await api("/api/week"); renderWeek(); }
      catch (err) { $("week-summaries").innerHTML = `<div class="empty">${t("chat.error")}${escapeHTML(err.message)}</div>`; }
    }
    function renderWeek() {
      const w = weekState;
      if (!w) return;
      $("week-plan-title").textContent = `${t("card.weekPlan")} · ${w.weekStart}`;
      if (document.activeElement !== $("week-plan")) $("week-plan").value = w.plan || "";

      const sums = [...w.summaries].sort((a, b) => new Date(b.ts) - new Date(a.ts));
      $("week-summaries").innerHTML = sums.length
        ? sums.map((s) => `<div class="summary"><div class="when">${fmtTime(s.ts)} · ${escapeHTML(s.model || t("summaries.noModel"))}</div><div class="markdown">${mdLite(s.text)}</div></div>`).join("")
        : `<div class="empty">${t("week.recapEmpty")}</div>`;

      const st = w.stats;
      $("week-totals").innerHTML =
        `<span>${t("week.tracked", { dur: fmtDuration(st.trackedMs) })}</span>` +
        `<span>${t("totals.notes", { n: st.noteCount })}</span>` +
        `<span>${t("totals.tasks", { n: st.taskCount })}</span>`;

      const todayDate = state ? state.date : null;
      $("week-grid").innerHTML = st.days.map((d) => `
        <div class="daycell ${d.date === todayDate ? "today" : ""}">
          <div class="d">${escapeHTML(weekdayLabel(d.date))} ${d.date.slice(5)}</div>
          <div>${d.trackedMs ? fmtDuration(d.trackedMs) : "—"}</div>
          ${d.topApp ? `<div style="color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHTML(d.topApp)}">${escapeHTML(d.topApp)}</div>` : ""}
          ${(d.notes || d.hasPlan) ? `<div style="color:var(--muted)">${[d.notes ? t("week.notesShort", { n: d.notes }) : "", d.hasPlan ? t("week.hasPlan") : ""].filter(Boolean).join(" · ")}</div>` : ""}
        </div>`).join("");

      if (st.topApps.length) {
        const max = st.topApps[0].durationMs || 1;
        $("week-apps").innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${t("week.appsLabel")}</div>` +
          st.topApps.map((a) => `
            <div style="display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:5px;">
              <div style="flex:0 0 130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHTML(a.name)}">${escapeHTML(a.name)}</div>
              <div style="flex:1;background:#f0ece6;border-radius:4px;height:7px;overflow:hidden;"><div style="width:${Math.max(3, Math.round(a.durationMs / max * 100))}%;height:100%;background:var(--accent);opacity:0.7;"></div></div>
              <div style="color:var(--muted);font-variant-numeric:tabular-nums;">${fmtDuration(a.durationMs)}</div>
            </div>`).join("");
      } else $("week-apps").innerHTML = "";
    }
    $("week-plan-save").onclick = async () => {
      try {
        await api("/api/week/plan", { method: "POST", body: { text: $("week-plan").value } });
        toast(t("toast.weekPlanSaved"));
      } catch (err) { toast(t("toast.errPrefix") + err.message); }
    };
    $("week-plan-draft").onclick = () => draftPlan("week-plan", "week-plan-hint", "plan.weekDraftQ");
    $("week-summarize").onclick = async () => {
      const btn = $("week-summarize");
      btn.disabled = true; btn.textContent = t("note.summarizing");
      try { await api("/api/week/summarize", { method: "POST", body: { lang: LANG } }); await refreshWeek(); toast(t("toast.weekSummaryDone")); }
      catch (err) { toast(t("toast.errPrefix") + err.message); }
      finally { btn.disabled = false; btn.textContent = t("week.generate"); }
    };

    // Wire up
    $("entry-save").onclick = saveEntry;
    $("entry").addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); saveEntry(); }
    });
    $("task-start").onclick = startTask;
    $("task-name").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); startTask(); }
    });
    $("summarize").onclick = summarize;

    // Initial paint of all static strings + the empty chat state.
    applyStatic();
    renderChat();

    // Auto-tick the running-task elapsed time once a minute.
    setInterval(() => { if (state) render(); }, 60 * 1000);

    // Sum raw activity segments (one per focus stretch) into totals by name,
    // sorted by time spent — the actually-useful view.
    function aggregate(records, keyOf) {
      const totals = new Map();
      for (const r of records || []) {
        const k = keyOf(r);
        if (!k) continue;
        totals.set(k, (totals.get(k) || 0) + (r.durationMs || 0));
      }
      return [...totals.entries()].sort((a, b) => b[1] - a[1]);
    }

    let trackerEnabled = true;

    function renderTrackerStatus(status) {
      const el = $("tracker-status");
      const btn = $("tracker-toggle");
      if (!status.supported) {
        el.textContent = t("tracker.macOnly");
        el.style.color = "var(--muted)";
        btn.style.display = "none";
        return;
      }
      trackerEnabled = status.enabled;
      btn.textContent = status.enabled ? t("tracker.pause") : t("tracker.resume");
      if (status.running) {
        const now = status.current ? t("tracker.appSep") + status.current.app : "";
        el.textContent = t("tracker.tracking") + now;
        el.style.color = "var(--good)";
      } else if (!status.enabled) {
        el.textContent = t("tracker.paused");
        el.style.color = "var(--muted)";
      } else if (status.lastError) {
        el.textContent = t("tracker.limited");
        el.style.color = "var(--accent)";
      } else {
        el.textContent = t("tracker.idle");
        el.style.color = "var(--muted)";
      }
    }

    // Fetch and render activity data
    async function refreshActivities() {
      try {
        renderTrackerStatus(await api("/api/activities/status"));

        const activities = await api(`/api/activities/${state.date}`);

        // App usage — aggregated by app, sorted by time, with proportional bars.
        const appsHost = $("activity-apps");
        const apps = aggregate(activities.apps, a => a.name || a.bundleId);
        if (apps.length > 0) {
          const totalMs = apps.reduce((s, [, ms]) => s + ms, 0);
          const max = apps[0][1] || 1;
          appsHost.innerHTML = `
            <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">
              ${t("act.appsSummary", { n: apps.length, dur: fmtDuration(totalMs) })}
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;">
              ${apps.slice(0, 12).map(([name, ms]) => `
                <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
                  <div style="flex:0 0 140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHTML(name)}">${escapeHTML(name)}</div>
                  <div style="flex:1;background:#f0ece6;border-radius:4px;height:8px;overflow:hidden;">
                    <div style="width:${Math.max(3, Math.round(ms / max * 100))}%;height:100%;background:var(--accent);opacity:0.7;"></div>
                  </div>
                  <div style="flex:0 0 auto;color:var(--muted);font-variant-numeric:tabular-nums;">${fmtDuration(ms)}</div>
                </div>
              `).join("")}
            </div>
          `;
        } else {
          appsHost.innerHTML = `<div class="empty">${t("act.appsEmpty")}</div>`;
        }

        // Window titles — what was actually on screen.
        const windowsHost = $("activity-windows");
        const windows = aggregate(activities.windows, w => w.title);
        if (windows.length > 0) {
          windowsHost.innerHTML = `
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${t("act.windowsLabel")}</div>
            <div style="display:flex;flex-direction:column;gap:4px;">
              ${windows.slice(0, 10).map(([title, ms]) => `
                <div style="display:flex;gap:10px;font-size:12px;">
                  <div style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHTML(title)}">${escapeHTML(title)}</div>
                  <div style="color:var(--muted);font-variant-numeric:tabular-nums;">${fmtDuration(ms)}</div>
                </div>
              `).join("")}
            </div>
          `;
        } else {
          windowsHost.innerHTML = "";
        }

        // Screenshots
        const screenshotsHost = $("activity-screenshots");
        if (activities.screenshots && activities.screenshots.length > 0) {
          screenshotsHost.innerHTML = `
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${t("act.screenshots", { n: activities.screenshots.length })}</div>
            <div style="display:flex;gap:8px;overflow-x:auto;">
              ${activities.screenshots.slice(-5).reverse().map(s => `
                <div style="flex-shrink:0;width:120px;">
                  <img src="/data/screenshots/${state.date}/${s.filename}"
                       style="width:100%;border-radius:6px;border:1px solid var(--line);"
                       alt="screenshot"
                       onerror="this.style.display='none'" />
                  <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:2px;">${fmtTime(s.ts)}</div>
                </div>
              `).join("")}
            </div>
          `;
        } else {
          screenshotsHost.innerHTML = "";
        }
      } catch (err) {
        console.error("Activity fetch failed:", err);
      }
    }

    // Pause / resume tracking.
    $("tracker-toggle").onclick = async () => {
      try {
        const res = await api("/api/tracker/toggle", { method: "POST", body: { enabled: !trackerEnabled } });
        renderTrackerStatus(res);
        toast(res.enabled ? t("toast.trackResumed") : t("toast.trackPaused"));
      } catch (err) { toast(t("toast.errPrefix") + err.message); }
    };

    // Auto-refresh activities every 30 seconds
    setInterval(() => { if (state) refreshActivities(); }, 30 * 1000);

    refresh()
      .then(refreshActivities)
      .catch((err) => {
        $("meta").textContent = t("chat.error") + err.message;
      });
  </script>
</body>
</html>
